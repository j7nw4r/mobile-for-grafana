# Dashboard provider — loads JSON files from this directory into Grafana
# under the "Demo" folder. Used by manual sim verification and (in
# Phase 2+) integration tests.
apiVersion: 1

providers:
  - name: demo
    orgId: 1
    folder: Demo
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
